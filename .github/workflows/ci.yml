name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine base commit
        id: base
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request' -and $env:PR_BASE_SHA) {
            echo "sha=$env:PR_BASE_SHA" >> $env:GITHUB_OUTPUT
          } elseif ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:PUSH_BEFORE -and $env:PUSH_BEFORE -notmatch '^0+$') {
            echo "sha=$env:PUSH_BEFORE" >> $env:GITHUB_OUTPUT
          } else {
            echo "sha=origin/main" >> $env:GITHUB_OUTPUT
          }

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Validate repository hygiene
        shell: pwsh
        run: |
          $forbidden = @(
            '.idea/',
            '.vs/',
            '.vscode/',
            '.DS_Store',
            'Thumbs.db',
            '.coverage',
            '.coveragexml'
          )

          $files = git ls-files
          $matches = foreach ($file in $files) {
            foreach ($pattern in $forbidden) {
              if ($file -like "*$pattern*") {
                $file
                break
              }
            }
          }

          if ($matches) {
            Write-Host 'Forbidden files were found in the repository:'
            $matches | Sort-Object -Unique | ForEach-Object { Write-Host " - $_" }
            exit 1
          }

      - name: Show .NET SDK info
        run: dotnet --info

      - name: Validate module definitions
        shell: pwsh
        run: .\scripts\omp\validate-module-definitions.ps1

      - name: Validate component versions
        shell: pwsh
        run: .\scripts\omp\validate-component-versions.ps1 -BaseCommit '${{ steps.base.outputs.sha }}'

      - name: Restore solution
        run: dotnet restore OpenModulePlatform.slnx

      - name: Build solution
        run: dotnet build OpenModulePlatform.slnx --configuration Release --no-restore

      - name: Start SQL Server LocalDB for integration tests
        shell: pwsh
        run: |
          sqllocaldb info MSSQLLocalDB
          if ($LASTEXITCODE -ne 0) { sqllocaldb create MSSQLLocalDB }
          sqllocaldb start MSSQLLocalDB

      - name: Provision OpenModulePlatform test database
        shell: pwsh
        run: |
          $server = '(localdb)\MSSQLLocalDB'
          sqlcmd -S $server -b -Q "IF DB_ID(N'OpenModulePlatform') IS NULL CREATE DATABASE [OpenModulePlatform]"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          sqlcmd -S $server -b -i sql\1-setup-openmoduleplatform.sql
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $init = (Get-Content -Raw sql\2-initialize-openmoduleplatform.sql).
              Replace('__BOOTSTRAP_PORTAL_ADMIN_PRINCIPAL__', 'BUILTIN\Administrators').
              Replace("= N'ADUser';", "= N'ADGroup';")
          $tempScript = Join-Path $env:TEMP 'omp-2-initialize-ci.sql'
          [System.IO.File]::WriteAllText($tempScript, $init, [System.Text.Encoding]::UTF8)
          sqlcmd -S $server -b -i $tempScript
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test
        env:
          OMP_TEST_CONNECTION_STRING: 'Server=(localdb)\MSSQLLocalDB;Integrated Security=true;TrustServerCertificate=true;Database=OpenModulePlatform'
        run: dotnet test OpenModulePlatform.slnx --configuration Release --no-build
